name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5.0.0

      - name: Inject Firebase config
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: |
          sed -i "s|REPLACE_WITH_YOUR_API_KEY|${FIREBASE_API_KEY}|g" index.html
          sed -i "s|REPLACE_WITH_YOUR_AUTH_DOMAIN|${FIREBASE_AUTH_DOMAIN}|g" index.html
          sed -i "s|REPLACE_WITH_YOUR_PROJECT_ID|${FIREBASE_PROJECT_ID}|g" index.html
          sed -i "s|REPLACE_WITH_YOUR_STORAGE_BUCKET|${FIREBASE_STORAGE_BUCKET}|g" index.html
          sed -i "s|REPLACE_WITH_YOUR_MESSAGING_SENDER_ID|${FIREBASE_MESSAGING_SENDER_ID}|g" index.html
          sed -i "s|REPLACE_WITH_YOUR_APP_ID|${FIREBASE_APP_ID}|g" index.html

      - name: Deploy Firestore rules
        run: npx firebase-tools@latest deploy --only firestore:rules --project "${{ secrets.FIREBASE_PROJECT_ID }}" --token "${{ secrets.FIREBASE_TOKEN }}" --non-interactive

      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - uses: actions/deploy-pages@v5
        id: deployment
